<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YieldWise CD Finder</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(#E8F5F9, #FFFFFF);
        font-family: Arial, sans-serif;
        color: #222;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    #title {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #222;
        text-align: center;
    }

    #container {
        margin-top: 120px;
        width: 100%;
        max-width: 600px;
        text-align: center;
    }

    .question {
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 30px;
    }

    input, select, textarea {
        width: 80%;
        padding: 12px;
        font-size: 18px;
        margin-bottom: 20px;
        border: 1px solid #CCC;
        border-radius: 6px;
    }

    button {
        background: #2E8B57;
        color: white;
        padding: 14px 28px;
        font-size: 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #256f46;
    }

    .small-text {
        font-size: 14px;
        margin-top: 10px;
        color: #555;
    }

    .restart {
        margin-top: 20px;
        font-size: 16px;
        text-decoration: underline;
        cursor: pointer;
        color: #2E8B57;
    }

    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div id="title">YieldWise CD Finder</div>
<div id="container"></div>

<script>
// ----------------------
// REAL BANK DATA (NAMES + LINKS)
// ----------------------
const cds = [
    {
        bank: "Ally Bank",
        term: "12 months",
        min: 0,
        link: "https://www.ally.com/bank/cd/"
    },
    {
        bank: "Capital One",
        term: "12 months",
        min: 0,
        link: "https://www.capitalone.com/bank/cds/"
    },
    {
        bank: "Discover Bank",
        term: "12 months",
        min: 2500,
        link: "https://www.discover.com/online-banking/cd/"
    },
    {
        bank: "Synchrony Bank",
        term: "12 months",
        min: 0,
        link: "https://www.synchronybank.com/banking/cds/"
    },
    {
        bank: "Marcus by Goldman Sachs",
        term: "12 months",
        min: 500,
        link: "https://www.marcus.com/us/en/savings/high-yield-cds"
    },
    {
        bank: "Citi",
        term: "12 months",
        min: 500,
        link: "https://online.citi.com/US/ag/cdit/cds"
    },
    {
        bank: "Bank of America",
        term: "12 months",
        min: 1000,
        link: "https://www.bankofamerica.com/deposits/cd-certificate-of-deposit/"
    },
    {
        bank: "Chase",
        term: "12 months",
        min: 1000,
        link: "https://www.chase.com/personal/savings/cd"
    },
    {
        bank: "Wells Fargo",
        term: "12 months",
        min: 2500,
        link: "https://www.wellsfargo.com/savings-cds/cds/"
    }
    // You can add more banks here as needed
];

// ----------------------
// QUESTION FLOW
// ----------------------
let step = 0;
let answers = {};

const questions = [
    { id: "firstName", text: "What's your first name?", type: "input" },
    { id: "email", text: "Great, {name}. What's the best email to send your results to?", type: "input" },
    {
        id: "amountChoice",
        text: "Alright {name}, how much money do you want to invest?",
        type: "select",
        options: ["$500","$1,000","$5,000","$10,000","$25,000","$50,000","Custom amount"]
    },
    { id: "amountCustom", text: "Enter your custom amount, {name}.", type: "input-amount", optional: true },
    {
        id: "timeframe",
        text: "How long can you leave the money untouched, {name}?",
        type: "select",
        options: ["3 months","6 months","12 months","18 months","24 months","36 months","60 months"]
    },
    {
        id: "mindeposit",
        text: "What's the minimum deposit you're comfortable with, {name}?",
        type: "select",
        options: ["$500","$1,000","$5,000","$10,000","$25,000","$50,000","Custom amount"]
    },
    { id: "mindepositCustom", text: "Enter your custom minimum deposit, {name}.", type: "input-amount", optional: true },
    {
        id: "currentrate",
        text: "What rate are you getting right now, {name}? (You can estimate.)",
        type: "input"
    },
    {
        id: "penalty",
        text: "How important is a low early‑withdrawal penalty to you, {name}?",
        type: "select",
        options: ["Very important","Somewhat important","Doesn't matter"]
    },
    {
        id: "addon",
        text: "Do you want the ability to add more money later, {name}?",
        type: "select",
        options: ["Yes","No","Doesn't matter"]
    },
    {
        id: "numresults",
        text: "How many CD options would you like me to analyze for you, {name}?",
        type: "select",
        options: ["1","3","5","10","Show all"]
    }
];

function personalize(text) {
    const name = answers.firstName || "";
    return text.replace(/{name}/g, name);
}

function renderQuestion() {
    const container = document.getElementById("container");
    const q = questions[step];

    // Skip optional custom questions if not needed
    if (q.optional && !shouldAskOptional(q.id)) {
        step++;
        renderQuestion();
        return;
    }

    let html = `<div class='question'>${personalize(q.text)}</div>`;

    if (q.type === "input") {
        html += `<input id="answer" type="text">`;
    } else if (q.type === "select") {
        html += `<select id="answer">`;
        q.options.forEach(o => html += `<option value="${o}">${o}</option>`);
        html += `</select>`;
    } else if (q.type === "input-amount") {
        html += `<input id="answer" type="number" min="0" step="1" placeholder="$0">`;
    }

    html += `<br><button onclick="nextStep()">Next</button>`;
    container.innerHTML = html;

    // If this is the amountChoice or mindeposit question, watch for "Custom amount"
    if (q.id === "amountChoice" || q.id === "mindeposit") {
        const selectEl = document.getElementById("answer");
        selectEl.addEventListener("change", () => {
            if (selectEl.value === "Custom amount") {
                // We don't show the custom input here; we handle it as the next question
            }
        });
    }
}

function shouldAskOptional(id) {
    if (id === "amountCustom") {
        return answers.amountChoice === "Custom amount";
    }
    if (id === "mindepositCustom") {
        return answers.mindeposit === "Custom amount";
    }
    return true;
}

function nextStep() {
    const q = questions[step];
    const el = document.getElementById("answer");
    if (!el) return;
    const val = el.value;

    answers[q.id] = val;

    step++;

    if (step < questions.length) {
        renderQuestion();
    } else {
        buildResultsAndGoToFeedback();
    }
}

function parseAmount(str) {
    if (!str) return 0;
    return parseFloat(String(str).replace(/[^0-9.]/g, "")) || 0;
}

function getFinalAmount() {
    if (answers.amountChoice === "Custom amount") {
        return parseAmount(answers.amountCustom);
    }
    return parseAmount(answers.amountChoice);
}

function getFinalMinDeposit() {
    if (answers.mindeposit === "Custom amount") {
        return parseAmount(answers.mindepositCustom);
    }
    return parseAmount(answers.mindeposit);
}

// Build results object (for email / logging)
function buildResults() {
    const amount = getFinalAmount();
    const minDeposit = getFinalMinDeposit();

    // Filter by min deposit and user amount
    const filtered = cds.filter(cd => amount >= cd.min && amount >= minDeposit);

    // For now, just return all that match; you can add more logic later
    return filtered;
}

let builtResults = [];

function buildResultsAndGoToFeedback() {
    builtResults = buildResults();
    startFeedback();
}

// ----------------------
// FEEDBACK FLOW
// ----------------------
const feedbackQuestions = [
    {
        id: "rating",
        text: "How would you rate this tool, {name}?",
        type: "select",
        options: ["1","2","3","4","5"]
    },
    {
        id: "feedback",
        text: "Would you like to add any feedback, {name}?",
        type: "textarea"
    },
    {
        id: "recommend",
        text: "Would you recommend this tool to friends or family, {name}?",
        type: "select",
        options: ["Yes","No"]
    },
    {
        id: "price",
        text: "What would you feel comfortable paying per month, {name}?",
        type: "select",
        options: ["$0","$5","$10","$15","$20+","Custom amount"]
    }
];

let feedbackStep = 0;
let feedback = {};

function startFeedback() {
    feedbackStep = 0;
    feedback = {};
    feedbackFlow();
}

function feedbackFlow() {
    const container = document.getElementById("container");
    const q = feedbackQuestions[feedbackStep];

    let html = `<div class='question'>${personalize(q.text)}</div>`;

    if (q.type === "textarea") {
        html += `<textarea id="fb" rows="4"></textarea>`;
    } else {
        html += `<select id="fb">`;
        q.options.forEach(o => html += `<option value="${o}">${o}</option>`);
        html += `</select>`;
    }

    const isLast = feedbackStep === feedbackQuestions.length - 1;
    html += `<br><button onclick="${isLast ? 'submitAll()' : 'nextFeedback()'}">${isLast ? 'Submit' : 'Next'}</button>`;
    container.innerHTML = html;
}

function nextFeedback() {
    const q = feedbackQuestions[feedbackStep];
    const val = document.getElementById("fb").value;
    feedback[q.id] = val;

    feedbackStep++;

    if (feedbackStep < feedbackQuestions.length) {
        feedbackFlow();
    }
}

function submitAll() {
    const q = feedbackQuestions[feedbackStep];
    const val = document.getElementById("fb").value;
    feedback[q.id] = val;

    // Build a payload that includes:
    // - name, email
    // - all answers
    // - feedback
    // - results (bank names + links)
    const payload = {
        firstName: answers.firstName,
        email: answers.email,
        answers,
        feedback,
        results: builtResults
    };

    // For now, just log it.
    // Later, you can POST this to Apps Script to:
    // - store in Google Sheets
    // - send an email with the results
    console.log("Final payload to send:", payload);

    endScreen();
}

function endScreen() {
    const name = answers.firstName || "there";
    const email = answers.email || "your email";

    document.getElementById("container").innerHTML =
        `<div class='question'>Thanks, ${name}.</div>
         <div class='small-text'>
            I'll email your CD results and links to ${email}.
         </div>
         <div class='restart' onclick="restart()">Start over</div>`;
}

function restart() {
    step = 0;
    answers = {};
    feedbackStep = 0;
    feedback = {};
    builtResults = [];
    renderQuestion();
}

// Start the flow
renderQuestion();
</script>

</body>
</html>
